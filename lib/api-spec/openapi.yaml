openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: config
    description: Public app configuration
  - name: me
    description: The currently authenticated user
  - name: users
    description: Public user profiles
  - name: projects
    description: Project resources
  - name: builds
    description: Project build history
  - name: files
    description: Project file contents
  - name: explore
    description: Explore feed
  - name: deployments
    description: Project publish pipeline
  - name: domains
    description: Custom domains attached to a project
  - name: admin
    description: Admin dashboard endpoints
  - name: storage
    description: Object storage upload and serving endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /config:
    get:
      operationId: appConfig
      tags: [config]
      summary: App config
      description: >
        Returns the public, server-advertised limits used by the frontend
        Files panel size gauge and the per-file upload pre-flight. The
        server is the single source of truth for these caps.
      responses:
        "200":
          description: App config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppConfig"
  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get the current user
      responses:
        "200":
          description: The current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
    patch:
      operationId: updateMe
      tags: [me]
      summary: Update profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeBody"
      responses:
        "200":
          description: The updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
  /me/onboarding:
    post:
      operationId: completeOnboarding
      tags: [me]
      summary: Submit the post-signup onboarding answers and stamp the user as onboarded
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteOnboardingBody"
      responses:
        "200":
          description: The updated user with onboardedAt set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
  /me/projects:
    get:
      operationId: listMyProjects
      tags: [me, projects]
      summary: List projects owned by the current user
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectListItem"
    post:
      operationId: createMyProject
      tags: [me, projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProjectResponse"
  /me/projects/{slug}:
    patch:
      operationId: renameMyProject
      tags: [me, projects]
      summary: Rename a project (and re-slug it)
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameProjectBody"
      responses:
        "200":
          description: The updated project list row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListItem"
    delete:
      operationId: deleteMyProject
      tags: [me, projects]
      summary: Delete a project
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
  /me/transactions:
    get:
      operationId: listMyTransactions
      tags: [me]
      summary: List the current user's transactions
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
  /users/{username}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a public user profile
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /users/{username}/projects:
    get:
      operationId: listUserProjects
      tags: [users, projects]
      summary: List a user's projects
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectListItem"
  /projects/{username}/{slug}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by owner + slug
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project's listing fields (owner only)
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: The updated project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
  /projects/{username}/{slug}/builds:
    get:
      operationId: listProjectBuilds
      tags: [projects, builds]
      summary: List builds for a project
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Builds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Build"
    post:
      operationId: createProjectBuild
      tags: [projects, builds]
      summary: Kick off a new build
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBuildBody"
      responses:
        "200":
          description: Created build
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Build"
  /projects/{username}/{slug}/files:
    get:
      operationId: listProjectFiles
      tags: [projects, files]
      summary: List file metadata for a project
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectFile"
  /projects/{username}/{slug}/files/upload:
    post:
      operationId: uploadProjectFile
      tags: [projects, files]
      summary: Upload a binary asset
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadProjectFileBody"
      responses:
        "200":
          description: Uploaded file metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFile"
  /projects/{username}/{slug}/files/{path}:
    get:
      operationId: getProjectFile
      tags: [projects, files]
      summary: Read a single file's contents
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: path
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: File contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFileContent"
    delete:
      operationId: deleteProjectFile
      tags: [projects, files]
      summary: Delete a single file from a project
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: path
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteProjectFileResponse"
  /projects/{username}/{slug}/publish:
    post:
      operationId: publishProject
      tags: [projects, deployments]
      summary: Start a publish pipeline
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Pipeline accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResponse"
  /projects/{username}/{slug}/deployments:
    get:
      operationId: listProjectDeployments
      tags: [projects, deployments]
      summary: List deployments for a project
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deployments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deployment"
  /projects/{username}/{slug}/deployments/{id}:
    get:
      operationId: getProjectDeployment
      tags: [projects, deployments]
      summary: Get a single deployment
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
  /projects/{username}/{slug}/publish-status:
    get:
      operationId: getPublishStatus
      tags: [projects, deployments]
      summary: Get the current publish status for a project
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Publish status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishStatus"
  /projects/{username}/{slug}/domains:
    get:
      operationId: listProjectDomains
      tags: [projects, domains]
      summary: List custom domains attached to a project
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Domains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectDomain"
    post:
      operationId: addProjectDomain
      tags: [projects, domains]
      summary: Attach a custom domain
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddDomainBody"
      responses:
        "200":
          description: Created domain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDomain"
  /projects/{username}/{slug}/domains/{host}:
    delete:
      operationId: removeProjectDomain
      tags: [projects, domains]
      summary: Remove a custom domain
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: host
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Removed
  /projects/{username}/{slug}/domains/{host}/verify:
    post:
      operationId: verifyProjectDomain
      tags: [projects, domains]
      summary: Re-check verification + DNS state for a domain
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: host
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Refreshed domain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDomain"
  /projects/{username}/{slug}/domains/{host}/primary:
    post:
      operationId: setPrimaryProjectDomain
      tags: [projects, domains]
      summary: Promote a verified domain to primary
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: host
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetPrimaryDomainResponse"
  /explore:
    get:
      operationId: explore
      tags: [explore]
      summary: Explore public projects
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
        - name: framework
          in: query
          required: false
          schema: { type: string }
        - name: sort
          in: query
          required: false
          description: >-
            Ordering for the result set. `trending` (default) ranks by
            clones decayed by recency, `newest` orders by creation time,
            and `most-cloned` orders by absolute clone count.
          schema:
            type: string
            enum: [trending, newest, most-cloned]
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExploreItem"
  /templates:
    get:
      operationId: listTemplates
      tags: [explore]
      summary: List admin-featured public templates
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemplateItem"
  /admin/templates:
    get:
      operationId: listAdminTemplates
      tags: [admin]
      summary: All public projects, with featured status, for admin curation
      responses:
        "200":
          description: Admin templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTemplateItem"
  /admin/projects/{id}/feature-template:
    patch:
      operationId: setProjectFeaturedTemplate
      tags: [admin]
      summary: Toggle a project's admin-featured-template flag
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetFeaturedTemplateBody"
      responses:
        "200":
          description: Updated row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTemplateItem"
  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Whether the current user is an admin
      responses:
        "200":
          description: Admin marker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMe"
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Aggregate platform stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
  /admin/recent-builds:
    get:
      operationId: listAdminRecentBuilds
      tags: [admin]
      summary: Recent builds across all projects
      responses:
        "200":
          description: Builds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminRecentBuild"
  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: All registered users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
  /admin/users/{id}/commission-pct:
    patch:
      operationId: updateAdminUserCommissionPct
      tags: [admin]
      summary: Override a user's referral commission %
      description: >
        Sets `users.referralCommissionPct` for the given user. Pass `null`
        to clear the override and fall back to the platform default (15%).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserCommissionBody"
      responses:
        "200":
          description: Updated row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
  /me/earnings/summary:
    get:
      operationId: getMyEarningsSummary
      tags: [me]
      summary: Aggregate referral earnings for the current user
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EarningsSummary"
  /me/earnings:
    get:
      operationId: listMyEarnings
      tags: [me]
      summary: Per-row referral earnings history for the current user
      responses:
        "200":
          description: Earnings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Earning"
  /me/referrals:
    get:
      operationId: getMyReferrals
      tags: [me]
      summary: Users the current creator has referred, with funnel stats
      description: |
        Lists every user that signed up via the current creator's profile or
        any of their templates, plus aggregate counts (total, paying,
        conversion %) and a breakdown by referral source. "Paying" means the
        referred user has produced at least one referral earning row.
      responses:
        "200":
          description: Referrals + funnel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyReferrals"
  /me/payouts/account:
    get:
      operationId: getMyPayoutAccount
      tags: [me]
      summary: Current user's Stripe Connect payout account status
      responses:
        "200":
          description: Connect account status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyPayoutAccount"
  /me/payouts/account/onboarding-link:
    post:
      operationId: createMyPayoutOnboardingLink
      tags: [me]
      summary: Start (or resume) Stripe Connect Express onboarding
      description: >
        Lazily provisions a Connect Express account on first call, then
        returns a single-use Stripe-hosted onboarding URL. The frontend
        navigates the user to it; Stripe redirects back to
        `returnUrl`/`refreshUrl` when they're done.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOnboardingLinkBody"
      responses:
        "200":
          description: Onboarding URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutOnboardingLink"
        "503":
          description: Stripe is not configured on this server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutError"
  /admin/payouts:
    get:
      operationId: listAdminPayouts
      tags: [admin]
      summary: All payouts across all creators
      responses:
        "200":
          description: Payouts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminPayout"
  /admin/payouts/run:
    post:
      operationId: runAdminPayouts
      tags: [admin]
      summary: Trigger one payout cycle now
      description: >
        Synchronously runs the same batching pipeline as the cron tick.
        Returns the per-status counts so the admin sees what happened.
      responses:
        "200":
          description: Cycle summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutCycleResult"
        "503":
          description: Stripe is not configured on this server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutError"
  /admin/payouts/{id}/retry:
    post:
      operationId: retryAdminPayout
      tags: [admin]
      summary: Re-queue a failed payout for the next cycle
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Retry status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryPayoutResponse"
        "404":
          description: Payout not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutError"
        "409":
          description: Payout is not in a retryable state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutError"
  /admin/cost-by-model:
    get:
      operationId: listAdminCostByModel
      tags: [admin]
      summary: AI cost broken down by model
      responses:
        "200":
          description: Cost rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminCostByModel"
  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL for direct-to-GCS upload
      description: |
        Returns a presigned PUT URL the browser uploads bytes to. The
        request body carries metadata only (name, size, contentType) — never
        the file itself. Auth is required so anonymous callers can't mint
        upload URLs against our bucket.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageError"
        "500":
          description: Failed to generate upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageError"
  /storage/uploads/finalize:
    post:
      operationId: finalizeUpload
      tags: [storage]
      summary: Finalize an uploaded object by stamping its ACL
      description: |
        Sets the ACL policy on a freshly-uploaded object (owner = caller,
        plus a public/private flag). Required because /storage/objects/*
        deny-lists any object that has no policy attached. Re-finalize is
        only allowed for the original owner.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinalizeUploadBody"
      responses:
        "200":
          description: Object finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalizeUploadResponse"
        "400":
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageError"
        "404":
          description: Object not found or not owned by caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageError"
        "500":
          description: Failed to finalize upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AppConfig:
      type: object
      properties:
        publishSizeLimitBytes:
          type: integer
          minimum: 0
          description: Maximum total payload size accepted by the publish endpoint, in bytes.
        perFileUploadLimitBytes:
          type: integer
          minimum: 0
          description: Maximum size of a single uploaded file, in bytes.
      required:
        - publishSizeLimitBytes
        - perFileUploadLimitBytes
    Me:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        email: { type: string }
        bio: { type: string }
        plan: { type: string }
        balance: { type: number }
        status: { type: string }
        signupDate:
          type: string
          description: YYYY-MM-DD signup date.
        role:
          type: string
          nullable: true
          description: Self-described persona collected during onboarding.
        signupSource:
          type: string
          nullable: true
          description: Where the user heard about us (collected during onboarding).
        onboardedAt:
          type: string
          format: date-time
          nullable: true
          description: When the user completed the onboarding flow. NULL while still pending.
      required:
        - id
        - username
        - displayName
        - email
        - bio
        - plan
        - balance
        - status
        - signupDate
        - role
        - signupSource
        - onboardedAt
    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        email: { type: string }
        bio: { type: string }
        avatarUrl:
          type: string
          nullable: true
        plan: { type: string }
        balance: { type: number }
        status: { type: string }
        signupDate: { type: string }
        publicProjects: { type: integer }
        totalClones: { type: integer }
      required:
        - id
        - username
        - displayName
        - email
        - bio
        - avatarUrl
        - plan
        - balance
        - status
        - signupDate
        - publicProjects
        - totalClones
    UpdateMeBody:
      type: object
      properties:
        username: { type: string }
        displayName: { type: string }
        bio: { type: string }
    CompleteOnboardingBody:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 60
          description: Optional name override. If omitted, the existing displayName is kept.
        role:
          type: string
          enum:
            - developer
            - entrepreneur
            - designer
            - product_manager
            - student
            - hobbyist
            - other
          description: Self-described persona collected during onboarding.
        signupSource:
          type: string
          enum:
            - google
            - twitter
            - youtube
            - reddit
            - producthunt
            - friend
            - word_of_mouth
            - other
          description: Where the user heard about us.
        plan:
          type: string
          enum:
            - free
            - pro
            - teams
          description: Selected plan tier. The actual paid subscription is still owned by Stripe.
      required:
        - role
        - signupSource
        - plan
    Transaction:
      type: object
      properties:
        id: { type: string }
        amount: { type: number }
        status: { type: string }
        method: { type: string }
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - amount
        - status
        - method
        - createdAt
    ProjectListItem:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        framework: { type: string }
        status: { type: string }
        isPublic: { type: boolean }
        isFeaturedTemplate: { type: boolean }
        clones: { type: integer }
        coverImageUrl:
          type: string
          nullable: true
        lastBuiltAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        buildsCount: { type: integer }
      required:
        - id
        - name
        - slug
        - description
        - framework
        - status
        - isPublic
        - isFeaturedTemplate
        - clones
        - coverImageUrl
        - lastBuiltAt
        - buildsCount
    ProjectOwner:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        avatarUrl:
          type: string
          nullable: true
      required:
        - id
        - username
        - displayName
        - avatarUrl
    Project:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        framework: { type: string }
        status: { type: string }
        isPublic: { type: boolean }
        isFeaturedTemplate: { type: boolean }
        features:
          type: array
          items: { type: string }
        coverImageUrl:
          type: string
          nullable: true
        clones: { type: integer }
        createdAt:
          type: string
          format: date-time
        lastBuiltAt:
          type: string
          format: date-time
        owner:
          $ref: "#/components/schemas/ProjectOwner"
        buildsCount: { type: integer }
        lastBuildAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - slug
        - description
        - framework
        - status
        - isPublic
        - isFeaturedTemplate
        - features
        - coverImageUrl
        - clones
        - createdAt
        - lastBuiltAt
        - owner
        - buildsCount
        - lastBuildAt
    UpdateProjectBody:
      type: object
      description: Patch any subset of project listing/visibility fields.
      properties:
        name: { type: string }
        description: { type: string }
        framework: { type: string }
        isPublic: { type: boolean }
        features:
          type: array
          items: { type: string }
        coverImageUrl:
          type: string
          nullable: true
    Build:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        number: { type: integer }
        prompt: { type: string }
        aiMessage: { type: string }
        durationSec: { type: integer }
        cost: { type: number }
        filesChanged: { type: integer }
        tokensIn: { type: integer }
        tokensOut: { type: integer }
        model: { type: string }
        status: { type: string }
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - number
        - prompt
        - aiMessage
        - durationSec
        - cost
        - filesChanged
        - tokensIn
        - tokensOut
        - model
        - status
        - createdAt
    CreateBuildBody:
      type: object
      properties:
        prompt: { type: string }
        model: { type: string }
      required:
        - prompt
    CreateProjectBody:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        framework: { type: string }
      required:
        - name
    CreateProjectResponse:
      type: object
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        ownerUsername: { type: string }
      required:
        - id
        - slug
        - name
        - ownerUsername
    RenameProjectBody:
      type: object
      properties:
        name: { type: string }
      required:
        - name
    ExploreItem:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        framework: { type: string }
        features:
          type: array
          items: { type: string }
        clones: { type: integer }
        coverImageUrl:
          type: string
          nullable: true
        lastBuiltAt:
          type: string
          format: date-time
        author: { type: string }
        authorDisplayName: { type: string }
      required:
        - id
        - name
        - slug
        - description
        - framework
        - features
        - clones
        - coverImageUrl
        - lastBuiltAt
        - author
        - authorDisplayName
    TemplateItem:
      type: object
      description: A public, admin-featured template surfaced on /templates.
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        framework: { type: string }
        features:
          type: array
          items: { type: string }
        coverImageUrl:
          type: string
          nullable: true
        clones: { type: integer }
        author: { type: string }
        authorDisplayName: { type: string }
      required:
        - id
        - name
        - slug
        - description
        - framework
        - features
        - coverImageUrl
        - clones
        - author
        - authorDisplayName
    AdminTemplateItem:
      type: object
      description: Admin curation row — every public project, featured or not.
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        framework: { type: string }
        coverImageUrl:
          type: string
          nullable: true
        clones: { type: integer }
        isFeaturedTemplate: { type: boolean }
        author: { type: string }
        authorDisplayName: { type: string }
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - description
        - framework
        - coverImageUrl
        - clones
        - isFeaturedTemplate
        - author
        - authorDisplayName
        - createdAt
    SetFeaturedTemplateBody:
      type: object
      properties:
        isFeaturedTemplate: { type: boolean }
      required:
        - isFeaturedTemplate
    FileEncoding:
      type: string
      enum: [utf8, base64]
    ProjectFile:
      type: object
      properties:
        path: { type: string }
        size: { type: integer }
        encoding:
          $ref: "#/components/schemas/FileEncoding"
        contentType:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
      required:
        - path
        - size
        - encoding
        - contentType
        - updatedAt
    ProjectFileContent:
      type: object
      properties:
        path: { type: string }
        content: { type: string }
        encoding:
          $ref: "#/components/schemas/FileEncoding"
        contentType:
          type: string
          nullable: true
      required:
        - path
        - content
        - encoding
        - contentType
    UploadProjectFileBody:
      type: object
      properties:
        path: { type: string }
        contentBase64: { type: string }
        contentType: { type: string }
      required:
        - path
        - contentBase64
    DeleteProjectFileResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        path: { type: string }
      required:
        - status
        - path
    DeploymentStatus:
      type: string
      enum:
        - queued
        - validating
        - provisioning_db
        - creating_project
        - deploying
        - polling
        - live
        - failed
    Deployment:
      type: object
      properties:
        id: { type: string }
        status:
          $ref: "#/components/schemas/DeploymentStatus"
        liveUrl:
          type: string
          nullable: true
        vercelInspectorUrl:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - status
        - liveUrl
        - vercelInspectorUrl
        - errorMessage
        - createdAt
        - finishedAt
    PublishResponse:
      type: object
      properties:
        deploymentId: { type: string }
        alreadyRunning: { type: boolean }
      required:
        - deploymentId
    PublishStatus:
      type: object
      properties:
        publishStatus: { type: string }
        liveUrl:
          type: string
          nullable: true
        lastPublishedAt:
          type: string
          format: date-time
          nullable: true
        primaryCustomDomain:
          type: string
          nullable: true
      required:
        - publishStatus
        - liveUrl
        - lastPublishedAt
        - primaryCustomDomain
    DomainVerificationRecord:
      type: object
      properties:
        type: { type: string }
        domain: { type: string }
        value: { type: string }
        reason: { type: string }
      required:
        - type
        - domain
        - value
        - reason
    DnsRecordType:
      type: string
      enum: [CNAME, A]
    DomainSuggestedRecord:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/DnsRecordType"
        name: { type: string }
        value: { type: string }
      required:
        - type
        - name
        - value
    DomainDnsMismatch:
      type: object
      properties:
        recordType:
          $ref: "#/components/schemas/DnsRecordType"
        expected: { type: string }
        actual:
          type: array
          items: { type: string }
      required:
        - recordType
        - expected
        - actual
    ProjectDomain:
      type: object
      properties:
        id: { type: string }
        host: { type: string }
        verified: { type: boolean }
        isPrimary: { type: boolean }
        misconfigured: { type: boolean }
        verificationRecords:
          type: array
          items:
            $ref: "#/components/schemas/DomainVerificationRecord"
        suggestedRecords:
          type: array
          items:
            $ref: "#/components/schemas/DomainSuggestedRecord"
        aValues:
          type: array
          nullable: true
          items: { type: string }
        cnames:
          type: array
          nullable: true
          items: { type: string }
        configuredBy:
          type: string
          nullable: true
        dnsMismatch:
          oneOf:
            - $ref: "#/components/schemas/DomainDnsMismatch"
            - type: "null"
        createdAt:
          type: string
          format: date-time
        lastCheckedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - host
        - verified
        - isPrimary
        - misconfigured
        - verificationRecords
        - suggestedRecords
        - aValues
        - cnames
        - configuredBy
        - dnsMismatch
        - createdAt
        - lastCheckedAt
    AddDomainBody:
      type: object
      properties:
        host: { type: string }
      required:
        - host
    SetPrimaryDomainResponse:
      type: object
      properties:
        status: { type: string }
      required:
        - status
    AdminMe:
      type: object
      properties:
        isAdmin: { type: boolean }
        configured: { type: boolean }
      required:
        - isAdmin
        - configured
    AdminStats:
      type: object
      properties:
        totalUsers: { type: integer }
        totalProjects: { type: integer }
        buildsToday: { type: integer }
        revenueGbp: { type: number }
        spendGbp: { type: number }
      required:
        - totalUsers
        - totalProjects
        - buildsToday
        - revenueGbp
        - spendGbp
    AdminRecentBuild:
      type: object
      properties:
        id: { type: string }
        duration: { type: integer }
        cost: { type: number }
        status: { type: string }
        createdAt:
          type: string
          format: date-time
        project: { type: string }
        username: { type: string }
      required:
        - id
        - duration
        - cost
        - status
        - createdAt
        - project
        - username
    AdminUser:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        email: { type: string }
        plan: { type: string }
        balance: { type: number }
        status: { type: string }
        signupDate: { type: string }
        # NULL = use the platform default (15%). Stored as an integer percent.
        referralCommissionPct:
          type: integer
          nullable: true
      required:
        - id
        - username
        - email
        - plan
        - balance
        - status
        - signupDate
        - referralCommissionPct
    UpdateUserCommissionBody:
      type: object
      properties:
        # NULL clears the override and falls back to the platform default.
        referralCommissionPct:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
      required:
        - referralCommissionPct
    EarningsSummary:
      type: object
      properties:
        totalEarned: { type: number }
        pending: { type: number }
        paid: { type: number }
        commissionPct: { type: integer }
      required:
        - totalEarned
        - pending
        - paid
        - commissionPct
    Earning:
      type: object
      properties:
        id: { type: string }
        amount: { type: number }
        commissionPct: { type: integer }
        status: { type: string }
        kind: { type: string }
        referredUsername:
          type: string
          nullable: true
        sourceProjectSlug:
          type: string
          nullable: true
        sourceProjectName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - amount
        - commissionPct
        - status
        - kind
        - referredUsername
        - sourceProjectSlug
        - sourceProjectName
        - createdAt
        - paidAt
    AdminCostByModel:
      type: object
      properties:
        model: { type: string }
        total: { type: number }
      required:
        - model
        - total
    ReferralSourceBreakdown:
      type: object
      description: |
        One row per referral entry-point. `sourceProjectSlug` is null when
        the source project has been deleted OR when the signup came via the
        creator's bare public profile (no template in the path). `kind`
        disambiguates the two so the client can label "Deleted template"
        separately from "Public profile".
      properties:
        sourceProjectSlug:
          type: string
          nullable: true
        sourceProjectName:
          type: string
          nullable: true
        kind:
          type: string
          enum: [profile, template, deleted_template]
        total: { type: integer }
        paying: { type: integer }
      required:
        - sourceProjectSlug
        - sourceProjectName
        - kind
        - total
        - paying
    ReferredUser:
      type: object
      properties:
        username: { type: string }
        displayName: { type: string }
        signupDate:
          type: string
          format: date
        sourceProjectSlug:
          type: string
          nullable: true
        sourceProjectName:
          type: string
          nullable: true
        kind:
          type: string
          enum: [profile, template, deleted_template]
        hasPaid: { type: boolean }
      required:
        - username
        - displayName
        - signupDate
        - sourceProjectSlug
        - sourceProjectName
        - kind
        - hasPaid
    MyReferrals:
      type: object
      properties:
        total: { type: integer }
        paying: { type: integer }
        conversionPct:
          type: number
          description: |
            Percentage of referred users who have produced at least one
            referral earning. 0 when `total` is 0. Rounded to 1 decimal.
        bySource:
          type: array
          items:
            $ref: "#/components/schemas/ReferralSourceBreakdown"
        users:
          type: array
          items:
            $ref: "#/components/schemas/ReferredUser"
      required:
        - total
        - paying
        - conversionPct
        - bySource
        - users
    MyPayoutAccount:
      type: object
      description: |
        Cached state of the current user's Stripe Connect Express
        account. `status` is null until they first click "Connect", then
        "pending" until Stripe finishes verifying ID + bank, then
        "verified" once `payouts_enabled` is true. `pendingTotal` is
        their unpaid referral earnings in GBP — useful for rendering
        "you have £X waiting" copy alongside the CTA.
      properties:
        connected: { type: boolean }
        status:
          type: string
          enum: [pending, verified]
          nullable: true
        payoutsEnabled: { type: boolean }
        detailsSubmitted: { type: boolean }
        pendingTotal: { type: number }
        minPayoutGbp: { type: number }
      required:
        - connected
        - status
        - payoutsEnabled
        - detailsSubmitted
        - pendingTotal
        - minPayoutGbp
    CreateOnboardingLinkBody:
      type: object
      description: |
        Where Stripe should bounce the user back to once they finish (or
        bail out of) the hosted onboarding flow. Both URLs MUST be
        absolute — Stripe rejects relative URLs.
      properties:
        returnUrl:
          type: string
          format: uri
        refreshUrl:
          type: string
          format: uri
      required:
        - returnUrl
        - refreshUrl
    PayoutOnboardingLink:
      type: object
      properties:
        url:
          type: string
          format: uri
        expiresAt: { type: integer }
      required:
        - url
        - expiresAt
    AdminPayout:
      type: object
      properties:
        id: { type: string }
        amount: { type: number }
        status:
          type: string
          enum: [queued, paid, failed]
        failureReason:
          type: string
          nullable: true
        stripeTransferId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
          nullable: true
        failedAt:
          type: string
          format: date-time
          nullable: true
        referrerUserId: { type: string }
        referrerUsername:
          type: string
          nullable: true
      required:
        - id
        - amount
        - status
        - failureReason
        - stripeTransferId
        - createdAt
        - paidAt
        - failedAt
        - referrerUserId
        - referrerUsername
    PayoutCycleResult:
      type: object
      properties:
        considered: { type: integer }
        paidOut: { type: integer }
        failed: { type: integer }
        skipped: { type: integer }
        configured: { type: boolean }
      required:
        - considered
        - paidOut
        - failed
        - skipped
        - configured
    RetryPayoutResponse:
      type: object
      properties:
        requeued: { type: boolean }
        reason:
          type: string
          nullable: true
      required:
        - requeued
        - reason
    PayoutError:
      type: object
      properties:
        status: { type: string }
        message: { type: string }
      required:
        - status
        - message
    UploadUrlRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
      required:
        - name
        - size
        - contentType
    UploadUrlResponse:
      type: object
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"
      required:
        - uploadURL
        - objectPath
        - metadata
    FinalizeUploadBody:
      type: object
      properties:
        objectPath:
          type: string
          description: Object path returned by requestUploadUrl, starting with /objects/.
          pattern: "^/objects/"
        visibility:
          type: string
          enum: [public, private]
      required:
        - objectPath
        - visibility
    FinalizeUploadResponse:
      type: object
      properties:
        objectPath:
          type: string
        visibility:
          type: string
          enum: [public, private]
      required:
        - objectPath
        - visibility
    StorageError:
      type: object
      properties:
        error: { type: string }
      required:
        - error
