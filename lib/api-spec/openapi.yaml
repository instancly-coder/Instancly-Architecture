openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: config
    description: Public app configuration
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /config:
    get:
      operationId: appConfig
      tags: [config]
      summary: App config
      description: >
        Returns the public, server-advertised limits used by the frontend
        Files panel size gauge and the per-file upload pre-flight. The
        server is the single source of truth for these caps.
      responses:
        "200":
          description: App config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppConfig"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AppConfig:
      type: object
      properties:
        publishSizeLimitBytes:
          type: integer
          minimum: 0
          description: Maximum total payload size accepted by the publish endpoint, in bytes.
        perFileUploadLimitBytes:
          type: integer
          minimum: 0
          description: Maximum size of a single uploaded file, in bytes.
      required:
        - publishSizeLimitBytes
        - perFileUploadLimitBytes
