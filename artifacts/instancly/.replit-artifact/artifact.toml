kind = "web"
previewPath = "/"
title = "Instancly"
version = "1.0.0"
id = "artifacts/instancly"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18505

[services.development]
run = "pnpm --filter @workspace/instancly run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/instancly", "run", "build" ]
publicDir = "artifacts/instancly/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18505"
BASE_PATH = "/"
